name: Windows

on:
  push:
    branches: [main]
    paths: ["windows/**", ".github/workflows/windows.yml"]
  pull_request:
    paths: ["windows/**", ".github/workflows/windows.yml"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        working-directory: windows/Anchor
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish (self-contained win-x64)
        run: dotnet publish Anchor.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: anchor-windows-installer
          path: windows/Anchor/installer-output/AnchorSetup.exe

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: anchor-windows
          path: windows/Anchor/publish
