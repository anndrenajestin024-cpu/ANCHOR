name: Windows

on:
  push:
    branches: [main]
    paths: ["windows/**", ".github/workflows/windows.yml"]
  pull_request:
    paths: ["windows/**", ".github/workflows/windows.yml"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        working-directory: windows/Anchor
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build signed MSIX package
        run: >
          msbuild Anchor.csproj /restore /t:Build
          /p:Configuration=Release
          /p:Platform=x64
          /p:RuntimeIdentifier=win-x64
          /p:SelfContained=true
          /p:WindowsAppSDKSelfContained=true
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageSigningEnabled=true
          /p:PackageCertificateKeyFile=Signing\AnchorSigning.pfx
          /p:PackageCertificatePassword=AnchorMsix2026
          /p:AppxBundle=Never
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageDir=AppPackages\

      - name: List package output (diagnostic)
        shell: pwsh
        run: Get-ChildItem -Recurse AppPackages | Select-Object FullName, Length | Sort-Object FullName | Format-Table -AutoSize | Out-String -Width 300

      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: anchor-windows-msix
          path: |
            windows/Anchor/AppPackages/**/*.msix
            windows/Anchor/Signing/AnchorSigning.cer
