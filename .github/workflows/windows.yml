name: Windows

on:
  push:
    branches: [main]
    paths: ["windows/**", ".github/workflows/windows.yml"]
  pull_request:
    paths: ["windows/**", ".github/workflows/windows.yml"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        working-directory: windows/Anchor
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish (self-contained single-file win-x64)
        run: dotnet publish Anchor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: anchor-windows
          path: windows/Anchor/publish
